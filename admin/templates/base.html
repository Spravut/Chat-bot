<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin · Dating Bot{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin/">💜 Dating Bot Admin</a>
      <div class="d-flex gap-2">
        <a class="btn btn-sm btn-outline-light" href="/admin/users">Users</a>
        <a class="btn btn-sm btn-outline-light" href="/admin/reports">
          Reports
          {% if pending_count and pending_count > 0 %}
            <span class="badge bg-danger ms-1">{{ pending_count }}</span>
          {% endif %}
        </a>
        <a class="btn btn-sm btn-outline-light" href="/admin/stats">Stats</a>
      </div>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
