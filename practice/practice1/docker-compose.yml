services:

  # ------------------------------------------------------------------ #
  # PostgreSQL database                                                  #
  # ------------------------------------------------------------------ #
  db:
    image: postgres:16-alpine
    container_name: online_store_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: online_store
      POSTGRES_USER: store_user
      POSTGRES_PASSWORD: store_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store_user -d online_store"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------ #
  # Python application — runs all three transaction scenarios            #
  # ------------------------------------------------------------------ #
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: online_store_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://store_user:store_pass@db:5432/online_store
    restart: "no"   # run once and exit


volumes:
  pg_data:
