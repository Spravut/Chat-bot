name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dating_bot
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile-check (syntax errors across the codebase)
        run: python -m compileall -q bot recalc_ratings.py

      - name: Apply Alembic migrations (Postgres)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/dating_bot
          DATABASE_URL_SYNC: postgresql+psycopg://postgres:postgres@localhost:5432/dating_bot
          BOT_TOKEN: dummy
        run: alembic upgrade head

      - name: Run pytest (SQLite in-memory)
        env:
          BOT_TOKEN: dummy
          METRICS_ENABLED: 'false'
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build bot image
        run: docker build -t dating-bot:ci .
      - name: Validate docker-compose configuration
        run: docker compose config -q
